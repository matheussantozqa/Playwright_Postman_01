name: Web Tests (Playwright + Allure)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'playwright_web/**'
      - '.github/workflows/web-tests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web-tests:
    name: Run Playwright + Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (necessario para Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias do projeto
        working-directory: playwright_web
        run: npm install --no-audit --no-fund

      - name: Instalar browsers do Playwright + system deps
        working-directory: playwright_web
        run: npx playwright install --with-deps chromium

      - name: Baixar historico anterior do Allure
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-checkout
        continue-on-error: true

      - name: Restaurar historico do Allure
        working-directory: playwright_web
        run: |
          mkdir -p allure-results
          if [ -d "../gh-pages-checkout/web/history" ]; then
            cp -r ../gh-pages-checkout/web/history allure-results/history
            echo "Historico restaurado com sucesso."
          else
            echo "Nenhum historico anterior encontrado (primeira execucao)."
          fi

      - name: Rodar Playwright
        id: playwright
        working-directory: playwright_web
        run: npm run test:ci
        continue-on-error: true

      - name: Injetar labels + copiar meta (categories/executor/env)
        if: always()
        working-directory: playwright_web
        run: |
          if [ -d "allure-results" ] && [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
            npm run inject-suites
            npm run copy-meta
          else
            echo "Sem allure-results - pulando inject."
            mkdir -p allure-results
            npm run copy-meta
          fi

      - name: Gerar report Allure
        if: always()
        working-directory: playwright_web
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "Nenhum resultado encontrado - gerando report vazio."
            mkdir -p allure-results
          fi
          npm run report:generate

      - name: Preparar site para publicacao (landing + report web)
        if: always()
        run: |
          mkdir -p site/web
          if [ -d "playwright_web/allure-report" ]; then
            cp -r playwright_web/allure-report/. site/web/
          else
            exit 1
          fi
          cat > site/index.html <<'HTML_EOF'
          <!DOCTYPE html>
          <html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>be_Talent_TestTec - Test Reports</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:white;border-radius:12px;padding:48px;max-width:640px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}h1{color:#1e3c72;margin-bottom:8px;font-size:28px}.subtitle{color:#666;margin-bottom:32px;font-size:14px}.reports{display:flex;flex-direction:column;gap:16px}.report-card{display:block;padding:20px 24px;background:#f8f9fb;border:2px solid #e1e4e8;border-radius:8px;text-decoration:none;color:#1e3c72;transition:all 0.2s}.report-card:hover{background:#1e3c72;color:white;border-color:#1e3c72;transform:translateY(-2px)}.report-title{font-size:18px;font-weight:600;margin-bottom:4px}.report-desc{font-size:13px;opacity:0.8}.footer{margin-top:32px;text-align:center;color:#999;font-size:12px}</style></head><body><div class="container"><h1>be_Talent_TestTec - Test Reports</h1><p class="subtitle">Reports de execucao dos testes automatizados</p><div class="reports"><a href="./api/" class="report-card"><div class="report-title">API Tests (Newman + Allure)</div><div class="report-desc">Testes da collection restful-booker</div></a><a href="./web/" class="report-card"><div class="report-title">Web Tests (Playwright)</div><div class="report-desc">Testes end-to-end da interface web</div></a></div><p class="footer">Atualizado automaticamente via GitHub Actions</p></div></body></html>
          HTML_EOF
          touch site/.nojekyll
          ls -la site/

      - name: Upload do report como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-web
          path: site/web
          retention-days: 30

      - name: Publicar site na branch gh-pages
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: atualiza Allure report Web - run ${{ github.run_number }}'

      - name: Falhar job se houver testes quebrados
        if: steps.playwright.outcome == 'failure'
        run: |
          echo "::error::Playwright reportou falhas - veja o Allure report em gh-pages/web."
          exit 1
